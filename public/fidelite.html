<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#F05C8A" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Crémà" />
<title>Crémà — Ma carte de fidélité</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<!-- Librairie Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --rose:#F05C8A; --roseL:#FFB6C9; --jaune:#FFD93D; --creme:#FFF4D8;
    --brun:#B7773C; --vert:#7FA66A; --noir:#181818; --soft:#9a8d84; --line:#ece1cc;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--creme);color:var(--noir);font-family:'Inter',system-ui,sans-serif;min-height:100vh}
  .logo{font-family:'Pacifico',cursive}
  .awning{height:14px;background:repeating-linear-gradient(90deg,var(--jaune) 0 22px,var(--creme) 22px 44px)}
  .wrap{max-width:460px;margin:0 auto;padding:24px 18px 40px}
  .card{background:#fff;border:2px solid var(--line);border-radius:24px;padding:22px;box-shadow:0 10px 30px rgba(0,0,0,.05)}
  .tap{transition:transform .08s ease;cursor:pointer}.tap:active{transform:scale(.97)}
  input{font-family:inherit;font-size:17px;font-weight:600;width:100%;padding:14px;border-radius:14px;border:2px solid var(--line);outline:none}
  input:focus{border-color:var(--rose)}
  .btn{width:100%;border:none;border-radius:16px;padding:15px;font-weight:800;font-size:16px;color:#fff;background:var(--rose);cursor:pointer}
  .btn:disabled{background:#e7ddca}
  .stamp{width:100%;aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;border:2px solid var(--line);background:#fff}
  .stamp.on{background:var(--rose);border-color:var(--rose)}
  .muted{color:var(--soft);font-size:13px}
  .spin{width:42px;height:42px;border-radius:50%;border:4px solid var(--roseL);border-top-color:var(--rose);animation:s 1s linear infinite;margin:24px auto}
  @keyframes s{to{transform:rotate(360deg)}}
  .fade{animation:f .25s ease}@keyframes f{from{opacity:0;transform:translateY(8px)}to{opacity:1}}
</style>
</head>
<body>
  <div class="awning"></div>
  <div class="wrap">
    <div style="text-align:center;margin-bottom:18px">
      <div class="logo" style="color:var(--rose);font-size:54px;line-height:1;transform:rotate(-3deg)">Crémà</div>
      <div class="muted" style="font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-top:4px">Carte de fidélité</div>
    </div>
    <div id="app"></div>
    <p class="muted" style="text-align:center;margin-top:22px;font-size:12px">Glaces artisanales bio · Albi · @crema.albi</p>
  </div>

<script>
/* ===== CONFIG SUPABASE — colle tes 2 valeurs ici ===== */
const SUPABASE_URL = "";   // ex: https://xxxx.supabase.co
const SUPABASE_KEY = "";   // clé "anon public"
const RECOMPENSE = 10;     // tampons pour 1 récompense
/* ===================================================== */

const app = document.getElementById("app");
const clean = (t)=> (t||"").replace(/[^0-9+]/g,"");
let sb = null;
if (SUPABASE_URL && SUPABASE_KEY && window.supabase) {
  try { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch(e){ sb=null; }
}

function screenSetup(){
  app.innerHTML = `<div class="card fade" style="text-align:center">
    <div style="font-weight:800;font-size:18px;margin-bottom:8px">Page pas encore activée</div>
    <p class="muted">Le propriétaire doit coller ses identifiants Supabase en haut du fichier pour que la carte fonctionne. (Voir le guide.)</p>
  </div>`;
}

function screenAsk(prefill=""){
  app.innerHTML = `<div class="card fade">
    <div style="font-weight:800;font-size:18px;margin-bottom:4px">Retrouve ta carte</div>
    <p class="muted" style="margin:0 0 16px">Entre le numéro de téléphone donné en boutique.</p>
    <input id="tel" inputmode="tel" placeholder="Ton téléphone" value="${prefill}" />
    <div id="err" class="muted" style="color:#E0524B;margin:8px 2px 0;display:none"></div>
    <button class="btn tap" id="go" style="margin-top:14px">Voir mes tampons</button>
  </div>`;
  const tel = document.getElementById("tel");
  const go = document.getElementById("go");
  tel.focus();
  go.onclick = ()=> lookup(tel.value);
  tel.onkeydown = (e)=>{ if(e.key==="Enter") lookup(tel.value); };
}

function loading(){ app.innerHTML = `<div class="card"><div class="spin"></div><p class="muted" style="text-align:center">Recherche…</p></div>`; }

async function lookup(raw){
  const tel = clean(raw);
  if (tel.length < 6){ const e=document.getElementById("err"); if(e){e.style.display="block";e.textContent="Numéro trop court.";} return; }
  loading();
  try {
    const { data, error } = await sb.from("clients").select("*").eq("tel", tel).maybeSingle();
    if (error) throw error;
    if (!data){ screenNotFound(tel); return; }
    try { localStorage.setItem("crema_tel", tel); } catch(e){}
    screenCard(data);
  } catch(e){
    app.innerHTML = `<div class="card fade"><div style="font-weight:800;margin-bottom:6px">Oups</div><p class="muted">Impossible de récupérer la carte pour le moment.</p><button class="btn tap" style="margin-top:12px" onclick="screenAsk('${tel}')">Réessayer</button></div>`;
  }
}

function screenNotFound(tel){
  app.innerHTML = `<div class="card fade" style="text-align:center">
    <div style="font-size:40px">🔍</div>
    <div style="font-weight:800;font-size:18px;margin:6px 0">Pas encore de carte</div>
    <p class="muted">Aucune carte trouvée pour ce numéro. Passe en boutique pour créer ta carte de fidélité Crémà !</p>
    <button class="btn tap" style="margin-top:14px;background:var(--creme);color:var(--noir)" onclick="screenAsk('${tel}')">Changer de numéro</button>
  </div>`;
}

function screenCard(c){
  const total = c.tampons || 0;
  const cur = total % RECOMPENSE;
  const ready = total >= RECOMPENSE;
  const filled = ready && cur===0 ? RECOMPENSE : cur;
  let cells = "";
  for(let i=0;i<RECOMPENSE;i++){ cells += `<div class="stamp ${i<filled?'on':''}">${i<filled?'🍦':''}</div>`; }
  app.innerHTML = `<div class="card fade">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <div style="font-weight:900;font-size:22px">Salut ${c.prenom||""} 👋</div>
      <div style="background:var(--creme);border-radius:999px;padding:5px 12px;font-weight:800;color:var(--rose)">${cur}/${RECOMPENSE}</div>
    </div>
    <p class="muted" style="margin:0 0 16px">${ready ? "🎁 Ta récompense t'attend en boutique !" : `Plus que <b style="color:var(--rose)">${RECOMPENSE-cur}</b> avant ta récompense.`}</p>
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px">${cells}</div>
    <div style="display:flex;justify-content:space-between;margin-top:18px" class="muted">
      <span>Total : <b style="color:var(--noir)">${total}</b> tampons</span>
      <span>${c.visites||0} visite${(c.visites||0)>1?'s':''}</span>
    </div>
    <button class="btn tap" id="refresh" style="margin-top:18px">Actualiser</button>
    <button class="btn tap" style="margin-top:8px;background:var(--creme);color:var(--soft)" onclick="screenAsk()">Changer de numéro</button>
    <p class="muted" style="text-align:center;margin-top:16px;font-size:12px">Astuce : ajoute cette page à ton écran d'accueil pour la retrouver vite ✨</p>
  </div>`;
  document.getElementById("refresh").onclick = ()=> lookup(c.tel);
}

/* démarrage */
if (!sb){ screenSetup(); }
else {
  let saved=""; try{ saved=localStorage.getItem("crema_tel")||""; }catch(e){}
  if (saved) lookup(saved); else screenAsk();
}
</script>
</body>
</html>
